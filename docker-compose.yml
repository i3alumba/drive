services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      API_ADDR: :8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: drive
      MINIO_USE_SSL: "false"
      TORRENT_WORK_DIR: /tmp/drive-torrents
      TORRENT_TIMEOUT_SECONDS: "7200"
    volumes:
      - torrent-work:/tmp/drive-torrents
    depends_on:
      minio:
        condition: service_healthy

  frontend:
    build:
      context: frontend

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  minio-data:
  torrent-work:
